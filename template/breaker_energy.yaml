- trigger:
    - platform: state
      entity_id: group.breaker_meter_energy
    - platform: time_pattern
      seconds: "/30"

  sensor:
    - name: Consumed Energy
      unique_id: consumed_energy
      unit_of_measurement: kWh
      device_class: energy
      state_class: total_increasing

      state: >
        {{ expand('group.breaker_meter_energy')
           | map(attribute='state')
           | map('float')
           | sum
           | round(3) }}

      availability: >
        {% set entities = expand('group.breaker_meter_energy') | list %}
        {{ entities | count > 0
           and entities | selectattr('state', 'is_number') | list | count
               == entities | count }}
