- trigger:
    - platform: state
      entity_id: group.breaker_meter_power
    - platform: time_pattern
      seconds: "/10"

  sensor:
    - name: Current Power
      unique_id: current_power
      unit_of_measurement: W
      device_class: power
      state_class: measurement

      state: >
        {{ expand('group.breaker_meter_power')
           | map(attribute='state')
           | map('float')
           | sum
           | round(0) }}

      availability: >
        {% set entities = expand('group.breaker_meter_power') | list %}
        {{ entities | count > 0
           and entities | selectattr('state', 'is_number') | list | count
               == entities | count }}
