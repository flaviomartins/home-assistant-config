- name: Breaker Power
  unique_id: breaker_power
  device_class: power
  state_class: measurement
  unit_of_measurement: W
  state: >
    {{ expand('group.breaker_meter_power')
       | selectattr('state','is_number')
       | map(attribute='state')
       | map('float')
       | sum
       | round(0) }}
  availability: >
    {{ expand('group.breaker_meter_power')
       | selectattr('state','is_number')
       | list
       | count > 0 }}
