- name: Lights Energy
  unique_id: lights_energy
  unit_of_measurement: kWh
  device_class: energy
  state_class: total_increasing
  state: >
    {% set sensors =
      states.sensor
      | selectattr('object_id','search',
        '(lights|lamps|light|lamp)_energy$')
      | selectattr('state','is_number')
      | map(attribute='state')
      | map('float')
      | list %}
    {{ sensors | sum | round(3) }}
  availability: >
    {{
      states.sensor
      | selectattr('object_id','search',
        '(lights|lamps|light|lamp)_energy$')
      | selectattr('state','is_number')
      | list
      | count > 0
    }}
